name: Fix corrupted files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decode Hero.tsx
        run: python3 -c "import base64; open('src/sections/Hero.tsx','wb').write(base64.b64decode(''))"

      - name: Decode Footer.tsx
        run: python3 -c "import base64; open('src/sections/Footer.tsx','wb').write(base64.b64decode(''))"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/sections/Hero.tsx src/sections/Footer.tsx
          git diff --cached --quiet || (git commit -m "fix encoding via base64 decode" && git push)
